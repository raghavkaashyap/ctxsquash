name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version tag to release, for example v0.1.2"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="$GITHUB_REF_NAME"
          fi

          if ! [[ "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must look like v0.1.2 or v0.1.2-rc.1"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          version="${{ steps.version.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/$version" >/dev/null 2>&1; then
            echo "Tag $version already exists"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$version"
          git push origin "refs/tags/$version"

  build:
    name: Build release binaries
    runs-on: ubuntu-latest
    needs: prepare

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.version }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          binary="ctxsquash"
          if [ "$GOOS" = "windows" ]; then
            binary="ctxsquash.exe"
          fi
          go build -trimpath -ldflags="-s -w" -o "dist/$binary" ./cmd/ctxsquash

      - name: Package
        run: |
          package="ctxsquash_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            cd dist
            zip "../${package}.zip" ctxsquash.exe
            cd ..
            sha256sum "${package}.zip" > "${package}.zip.sha256"
          else
            tar -C dist -czf "${package}.tar.gz" ctxsquash
            sha256sum "${package}.tar.gz" > "${package}.tar.gz.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ctxsquash_${{ matrix.goos }}_${{ matrix.goarch }}
          path: |
            ctxsquash_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive }}
            ctxsquash_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive }}.sha256

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ needs.prepare.outputs.version }}"
          gh release create "$version" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "$version" \
            --notes "Prebuilt ctxsquash binaries for macOS, Linux, and Windows."
